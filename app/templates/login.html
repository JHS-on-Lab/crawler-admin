<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — Crawler Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
      background: #f1f5f9; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      width: 100%; max-width: 360px;
      background: #fff; border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2.25rem 2rem;
    }
    .brand {
      display: flex; align-items: center; gap: 0.6rem;
      margin-bottom: 1.75rem;
    }
    .brand-icon {
      width: 36px; height: 36px; border-radius: 9px;
      background: #2563eb;
      display: flex; align-items: center; justify-content: center;
    }
    .brand-name { font-size: 1rem; font-weight: 700; color: #1e293b; }
    .brand-sub  { font-size: 0.75rem; color: #64748b; }
    .form-label { font-size: 0.8rem; font-weight: 600; color: #374151; margin-bottom: 0.35rem; }
    .form-control { font-size: 0.875rem; padding: 0.55rem 0.75rem; border-radius: 7px; }
    .form-control:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }
    .btn-login {
      background: #2563eb; color: #fff; border: none;
      border-radius: 7px; padding: 0.6rem; font-size: 0.875rem; font-weight: 600;
      width: 100%; transition: background 0.15s;
    }
    .btn-login:hover { background: #1d4ed8; }
    .error-msg {
      background: #fee2e2; color: #991b1b; font-size: 0.8rem;
      border-radius: 7px; padding: 0.6rem 0.875rem; margin-bottom: 1rem;
      display: flex; align-items: center; gap: 0.4rem;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon"><i class="bi bi-cpu-fill text-white"></i></div>
      <div>
        <div class="brand-name">Crawler Admin</div>
        <div class="brand-sub">내부 운영 관리 시스템</div>
      </div>
    </div>

    {% if error %}
    <div class="error-msg">
      <i class="bi bi-exclamation-circle-fill"></i> {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login">
      <div class="mb-3">
        <label class="form-label">아이디</label>
        <input type="text" name="username" class="form-control" placeholder="admin" autofocus required>
      </div>
      <div class="mb-4">
        <label class="form-label">비밀번호</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login">로그인</button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
